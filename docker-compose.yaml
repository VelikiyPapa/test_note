name: my_postgres_server
services:
  postgres-db:
    image: postgres:16
    container_name: my_postgres_server
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_DB=test_note
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data